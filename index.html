<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dynamic Content Demo</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= Header ================= -->

    <header class="dc-header">

        <h1>Demo Shop</h1>

        <p>Dynamic Content テストページ</p>

    </header>

    <!-- ================= Main ================= -->

    <main class="dc-container">

        <!-- Search -->

        <section class="dc-card">

            <h2>商品検索</h2>

            <input
                id="searchInput"
                class="dc-input"
                type="text"
                placeholder="商品名を入力">

            <div
                id="searchResult"
                class="dc-result">

            </div>

        </section>

        <!-- Dropdown -->

        <section class="dc-card">

            <h2>カテゴリ</h2>

            <select
                id="categorySelect"
                class="dc-select">

                <option value="">選択してください</option>

                <option value="pc">パソコン</option>

                <option value="book">本</option>

                <option value="food">食品</option>

            </select>

            <div
                id="categoryResult"
                class="dc-result">

            </div>

        </section>

        <!-- Product -->

        <section class="dc-card">

            <h2>商品</h2>

            <div class="dc-product">

                <h3>MacBook Pro</h3>

                <p id="priceText">

                    価格：150,000円

                </p>

            </div>

            <button
                id="updateBtn"
                class="dc-btn">

                データ更新

            </button>

        </section>

        <!-- Dynamic Buttons -->

        <section class="dc-card">

            <h2>Dynamic Test</h2>

            <div class="dc-button-group">

                <button
                    id="popupBtn"
                    class="dc-btn">

                    Popup

                </button>

                <button
                    id="modalBtn"
                    class="dc-btn">

                    Modal

                </button>

                <button
                    id="toastBtn"
                    class="dc-btn">

                    Toast

                </button>

                <button
                    id="addTextBtn"
                    class="dc-btn">

                    Text追加

                </button>

            </div>

            <div
                id="dynamicArea"
                class="dc-result">

            </div>

        </section>

    </main>

    <!-- ================= Popup ================= -->

    <div
        id="popup"
        class="dc-popup">

        <div class="dc-popup-box">

            <h3>お知らせ</h3>

            <p>

                新商品が追加されました。

            </p>

            <button
                id="closePopup"
                class="dc-btn">

                閉じる

            </button>

        </div>

    </div>

    <!-- ================= Modal ================= -->

    <div
        id="modal"
        class="dc-modal">

        <div class="dc-modal-box">

            <h3>確認</h3>

            <p>

                保存しますか？

            </p>

            <button
                id="closeModal"
                class="dc-btn">

                OK

            </button>

        </div>

    </div>

    <!-- ================= Toast ================= -->

    <div
        id="toast"
        class="dc-toast">

        保存しました。

    </div>

    <script src="script.js"></script>

</body>

</html>
